# Information-cascade LLM experiment config
model: claude-opus-4-8
thinking: adaptive          # adaptive | disabled
effort: medium              # low | medium | high | max  (output_config.effort)
max_tokens: 2000

qs: [0.6, 0.6666666666666666, 0.75]
l_max: 5                    # max public-run length (focal at position L+1)
run_color: red

n_variants: 16              # paraphrase/color-swap/sampling variants per scenario cell
n_templates: 3              # distinct system-prompt phrasings
comprehension_n: 12         # comprehension-check calls (subset)
max_concurrency: 12
seed: 0

output_dir: results
