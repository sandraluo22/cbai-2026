arm: text
coupling_mode: two_layer
seed: 0
object_name: elephant
neutral_ablation: true
smoke_test: false
model:
  text_model: NousResearch/Meta-Llama-3.1-8B-Instruct
  vision_model: Qwen/Qwen2-VL-7B-Instruct
  vision_model_fallback: meta-llama/Llama-3.2-11B-Vision-Instruct
  dtype: bfloat16
  device_map: auto
  smoke_text_model: sshleifer/tiny-gpt2
observation:
  feature_subset_size: 1
  distractor_features: 0
  patch_grid:
  - 3
  - 3
  patch_overlap: 0.0
  source_image_dir: null
readout:
  canonical: length_norm
  do_hard_readout: true
  anchor_template: '{private}


    Based on the clues, the object is most likely one of {candidate_list}.

    Answer:'
  hard_template: '{private}


    Give your belief as a JSON object mapping each candidate to a probability (probabilities
    summing to 1). Candidates: {candidate_list}.

    Respond with ONLY the JSON object.

    JSON:'
activations:
  capture: true
  layers: all
  dtype: float16
  max_disk_gb: 50.0
  store_format: memmap
qsg:
  n: 6
  alpha: 0.3
  m: 1.0
  rounds: 15
  interactions_per_round: null
  topology: well_mixed
  consensus_threshold: 0.95
ontology_path: configs/ontology.yaml
output_root: results_exp2
