# Single-run base config. Sweep lists (configs/sweep_text.yaml) override these.
base:
  arm: text
  coupling_mode: two_layer
  seed: 0
  neutral_ablation: false
  smoke_test: false
  ontology_path: configs/ontology.yaml
  output_root: results

  model:
    text_model: meta-llama/Llama-3.1-8B-Instruct
    vision_model: Qwen/Qwen2-VL-7B-Instruct
    vision_model_fallback: meta-llama/Llama-3.2-11B-Vision-Instruct
    dtype: bfloat16
    device_map: auto
    smoke_text_model: sshleifer/tiny-gpt2

  observation:
    feature_subset_size: 1     # one generic adjective per agent — individually ambiguous
    distractor_features: 0
    patch_grid: [3, 3]
    patch_overlap: 0.0

  readout:
    canonical: length_norm
    do_hard_readout: true

  activations:
    capture: true
    layers: all
    dtype: float16
    max_disk_gb: 50.0
    store_format: memmap

  qsg:
    n: 8
    alpha: 0.3
    m: 1.0
    rounds: 30
    consensus_threshold: 0.95

# Cartesian-product sweep axes
arms: [text]
coupling_modes: [pure_qsg, two_layer]
n_values: [8]
alpha_values: [0.3]
m_values: [1, 4, soft]
seeds: [0, 1]
neutral_ablation_values: [false]
